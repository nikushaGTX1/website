<div class="agents-container">
  <div class="agents-header">
    <h1 class="title">Agents</h1>
    
    <div class="filter-controls">
      <div class="search-wrapper">
        <input 
          type="text" 
          [(ngModel)]="searchQuery" 
          (input)="onFilterChange()" 
          placeholder="Search agents..." 
          class="filter-input"
        />
      </div>

      <div class="sort-wrapper">
        <svg class="icon-filter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="21" x2="4" y2="14"></line>
          <line x1="4" y1="10" x2="4" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12" y2="3"></line>
          <line x1="20" y1="21" x2="20" y2="16"></line>
          <line x1="20" y1="12" x2="20" y2="3"></line>
          <line x1="1" y1="14" x2="7" y2="14"></line>
          <line x1="9" y1="8" x2="15" y2="8"></line>
          <line x1="17" y1="16" x2="23" y2="16"></line>
        </svg>
        <select [(ngModel)]="selectedSort" (change)="onFilterChange()" class="filter-select">
          <option value="name-az">SORT: A-Z</option>
          <option value="name-za">SORT: Z-A</option>
          <option value="deals-high">Deals: High to Low</option>
          <option value="rating-high">Rating: Highest First</option>
        </select>
      </div>
    </div>
  </div>

  <div class="agents-list">
    <p class="agents-message error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <ng-container *ngIf="isLoading">
      <div class="agent-card skeleton" *ngFor="let item of skeletonCards">
        <div class="card-left">
          <div class="avatar-container skeleton-blink"></div>
          <div class="rating-badge skeleton-blink-line short"></div>
        </div>
        <div class="card-info">
          <div class="skeleton-blink-line title-line"></div>
          <div class="skeleton-blink-line subtitle-line"></div>
          <div class="skeleton-blink-line subtitle-line short"></div>
          <div class="skeleton-blink-line info-line"></div>
        </div>
        <div class="card-bio">
          <div class="skeleton-blink-line paragraph-line"></div>
          <div class="skeleton-blink-line paragraph-line"></div>
          <div class="skeleton-blink-line paragraph-line partial"></div>
        </div>
        <div class="card-actions">
          <div class="action-btn skeleton-btn"></div>
          <div class="action-btn skeleton-btn"></div>
        </div>
      </div>
    </ng-container>

    <p class="agents-message" *ngIf="!isLoading && !errorMessage && agents.length === 0">
      No agents found.
    </p>

    <ng-container *ngIf="!isLoading && agents.length > 0">
      <div class="agent-card" *ngFor="let agent of agents">
        <div class="card-left">
          <div class="avatar-container">
            <img
              [src]="agent.avatarUrl || '/agent1.jpg'"
              [alt]="agent.name"
              class="avatar"
              (error)="fixAgentImage($event)"
            >
          </div>
          <div class="rating-badge">
            <svg class="icon-star" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
            </svg>
            <span class="rating-text">{{ agent.rating | number:'1.1-1' }}</span>
            <span class="rating-count">({{ agent.ratingCount }})</span>
          </div>
        </div>

        <div class="card-info">
          <h2 class="agent-name">{{ agent.name }}</h2>
          <p class="agent-role">{{ agent.role }}</p>
          <p class="agent-location">{{ agent.location }}</p>
          <p class="agent-deals">Closed deals: {{ agent.closedDeals }}</p>
        </div>

        <div class="card-bio">
          <p>{{ agent.bio }}</p>
        </div>

        <div class="card-actions">
          <button class="action-btn" (click)="onCall(agent)" aria-label="Call agent">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </button>
          <button class="action-btn" (click)="onMessage(agent)" aria-label="Message agent">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
          </button>
        </div>
      </div>
    </ng-container>
  </div>
</div>

<section class="career">

    <div class="career-overlay"></div>

    <div class="career-container">

        <div class="career-content">

            <h2>
                Start a career as<br>
                a real estate agent<br>
                with us.
            </h2>

            <a href="#" class="career-btn">
                Submit a form
            </a>

        </div>

    </div>

</section>
